name: Manual Release

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: "Release title"
        required: false
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  next-tag:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.bump.outputs.tag_name }}
    steps:
      - name: Find next release tag
        id: bump
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const semver = /^v(\d+)\.(\d+)\.(\d+)$/;
            let latest = null;

            for (const release of data) {
              const match = release.tag_name.match(semver);
              if (!match) {
                continue;
              }

              const candidate = {
                major: Number(match[1]),
                minor: Number(match[2]),
                patch: Number(match[3]),
              };

              if (
                !latest ||
                candidate.major > latest.major ||
                (candidate.major === latest.major && candidate.minor > latest.minor) ||
                (candidate.major === latest.major && candidate.minor === latest.minor && candidate.patch > latest.patch)
              ) {
                latest = candidate;
              }
            }

            const next = latest
              ? `v${latest.major}.${latest.minor}.${latest.patch + 1}`
              : 'v0.1.0';

            core.setOutput('tag_name', next);

  latest-ci-run:
    runs-on: ubuntu-latest
    needs: next-tag
    outputs:
      run_id: ${{ steps.pick.outputs.run_id }}
    steps:
      - name: Find latest successful CI run
        id: pick
        uses: actions/github-script@v7
        with:
          script: |
            const workflow_id = 'ci-build.yml';
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id,
              status: 'success',
              per_page: 1,
            });

            const run = data.workflow_runs[0];
            if (!run) {
              core.setFailed(`No successful runs found for ${workflow_id}`);
              return;
            }

            core.setOutput('run_id', String(run.id));

  release:
    runs-on: windows-latest
    needs: [next-tag, latest-ci-run]
    steps:
      - name: Download CI artifact
        uses: dawidd6/action-download-artifact@v11
        with:
          workflow: ci-build.yml
          run_id: ${{ needs.latest-ci-run.outputs.run_id }}
          name: MusicFlow-windows-exe
          path: release-artifact

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.next-tag.outputs.tag_name }}
          name: ${{ inputs.release_name != '' && inputs.release_name || needs.next-tag.outputs.tag_name }}
          prerelease: ${{ inputs.prerelease }}
          files: release-artifact/MusicFlow.exe
